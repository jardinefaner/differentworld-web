<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Different World</title>
  <style>
    :root {
      --bg: #faf8f4;
      --fg: #1a1a1a;
      --muted: #6b6b6b;
      --accent: #2f6f5f;
    }
    @media (prefers-color-scheme: dark) {
      :root { --bg: #16181a; --fg: #f3f3f3; --muted: #9a9a9a; --accent: #6fc7af; }
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Inter", system-ui, sans-serif;
      background: var(--bg);
      color: var(--fg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px;
      text-align: center;
      line-height: 1.5;
    }
    h1 { font-size: 2.25rem; margin: 0 0 8px; font-weight: 700; }
    .tag { color: var(--muted); margin: 0 0 32px; max-width: 480px; }
    .links { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
    a.btn {
      display: inline-block;
      padding: 12px 20px;
      border-radius: 12px;
      background: var(--accent);
      color: white;
      text-decoration: none;
      font-weight: 600;
    }
    a.btn.secondary { background: transparent; color: var(--accent); border: 1px solid var(--accent); }
    footer { margin-top: 64px; color: var(--muted); font-size: 0.85rem; }
  </style>
</head>
<body>
  <h1>Different World</h1>
  <p class="tag">Offline-first classroom planning &amp; logging for early-childhood program staff.</p>
  <div class="links">
    <!-- Store links go here once published. -->
    <a class="btn" href="mailto:hello@differentworld.app">Get in touch</a>
  </div>
  <footer>If you scanned a QR code, the app should have opened automatically. If it didn't, install Different World on your phone and scan again.</footer>
</body>
</html>
